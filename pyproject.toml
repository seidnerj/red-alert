[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "red-alert"
version = "3.0.0"
description = "Israeli Home Front Command (Pikud Ha-Oref) alert monitor"
requires-python = ">=3.11"

dependencies = [
    "httpx",
]

[project.optional-dependencies]
homeassistant = [
    "appdaemon",
]
homebridge = [
    "aiohttp",
]
unifi = [
    "asyncssh",
]
dev = [
    "pre-commit",
    "pytest",
    "pytest-aiohttp",
    "pytest-asyncio",
    "ruff",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
indent-width = 4
line-length = 150
target-version = "py311"

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
docstring-code-format = true

[tool.uv]
python = "3.11"
