# Pre-commit configuration for RedAlert
# Install with: pip install pre-commit && pre-commit install
# Run manually with: pre-commit run --all-files

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        name: ruff lint
        description: Run ruff linter
        args: [--fix]
        types: [python]

      - id: ruff-format
        name: ruff format
        description: Run ruff formatter
        types: [python]

  # Built-in pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
        description: Trims trailing whitespace
        exclude: \.claude/settings\.local\.json$

      - id: end-of-file-fixer
        name: fix end of files
        description: Makes sure files end with exactly one newline
        exclude: \.claude/settings\.local\.json$

      - id: check-merge-conflict
        name: check for merge conflicts
        description: Check for files that contain merge conflict strings

      - id: check-added-large-files
        name: check for large files
        description: Prevent giant files from being committed
        args: ['--maxkb=1000']

      - id: check-ast
        name: check python ast
        description: Check whether files parse as valid python
        types: [python]

      - id: check-builtin-literals
        name: check builtin type constructor use (Python)
        description: Forbid calls to builtin constructors when literal syntax is available
        types: [python]

      - id: debug-statements
        name: debug statements (Python)
        description: Check for debugger imports and py37+ breakpoint() calls
        types: [python]

      - id: check-json
        name: check json
        description: Attempts to load all json files to verify syntax

      - id: check-yaml
        name: check yaml
        description: Attempts to load all YAML files to verify syntax
        args: [--allow-multiple-documents]

      - id: pretty-format-json
        name: pretty format JSON
        description: Checks or prettifies JSON files
        args: [--autofix]
        exclude: \.claude/settings\.local\.json$

  # Type checking (uses project venv so all deps are available)
  - repo: local
    hooks:
      - id: type-checking
        name: type checking (mypy)
        description: Run mypy on the codebase using the project virtualenv
        entry: bash -c 'PYENV_VERSION=red-alert python -m mypy src/'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

  # Local hooks
  - repo: local
    hooks:
      - id: check-claude-attribution
        name: check commit message for Claude attribution
        description: Prevent commits with Claude attribution
        entry: bash scripts/check-claude-attribution.sh
        language: system
        stages: [commit-msg]
        always_run: true
        pass_filenames: true

# Global settings
default_stages: [pre-commit]
fail_fast: false
default_language_version:
  python: python3.14
